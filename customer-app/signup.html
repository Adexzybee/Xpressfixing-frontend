<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Create Account — Xpressfixing</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #07070b;
  --surface: #0f1117;
  --card: #151824;
  --border: #262a3d;
  --accent: #00ffa6;
  --accent-2: #00cfff;
  --accent-soft: rgba(0,255,166,0.12);
  --text: #f5f7ff;
  --muted: #9aa0c3;
  --danger: #ff6b6b;
  --success: #00d4aa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #07070b 0%, #0f1117 100%);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  text-decoration: none;
  margin-bottom: 24px;
  transition: color 0.3s ease;
}

.back-link:hover {
  color: var(--accent);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
}

.logo span {
  color: var(--accent);
}

.logo-sub {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
}

.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
}

.input-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 500;
}

input {
  width: 100%;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.9rem;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  border-radius: 12px;
  color: #001b12;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 8px;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,255,166,0.3);
}

.btn-secondary {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 12px;
  text-decoration: none;
  display: inline-block;
  text-align: center;
}

.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.divider {
  text-align: center;
  margin: 24px 0;
  position: relative;
}

.divider::before,
.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 30px);
  height: 1px;
  background: var(--border);
}

.divider::before { left: 0; }
.divider::after { right: 0; }

.divider span {
  background: var(--card);
  padding: 0 12px;
  color: var(--muted);
  font-size: 0.8rem;
}

.error-message {
  background: rgba(255,107,107,0.1);
  border: 1px solid var(--danger);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 20px;
  color: var(--danger);
  font-size: 0.85rem;
  display: none;
}

.success-message {
  background: rgba(0,212,170,0.1);
  border: 1px solid var(--success);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 20px;
  color: var(--success);
  font-size: 0.85rem;
  display: none;
}

.terms {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
  margin-top: 20px;
}

.terms a {
  color: var(--accent);
  text-decoration: none;
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #001b12;
  padding: 12px 24px;
  border-radius: 12px;
  font-weight: 600;
  z-index: 1000;
  display: none;
}

@media (max-width: 480px) {
  .auth-card {
    padding: 24px;
  }
}
</style>
</head>
<body>
<div class="container">
  <a href="../public/index.html" class="back-link">← Back to Home</a>
  
  <div class="logo">
    xpress<span>fixing</span>
    <div class="logo-sub">Create your account</div>
  </div>

  <div class="auth-card">
    <div id="signup-error" class="error-message"></div>
    <div id="signup-success" class="success-message"></div>
    
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="John Doe">
    </div>
    
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="john@example.com">
    </div>
    
    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="signup-phone" placeholder="0812 345 6789">
    </div>
    
    <div class="input-group">
      <label>Location (City)</label>
      <input type="text" id="signup-location" placeholder="e.g., Lagos, Abuja, Port Harcourt">
    </div>
    
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Create a strong password">
    </div>
    
    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="signup-confirm" placeholder="Confirm your password">
    </div>
    
    <button class="btn-primary" onclick="handleSignup()">Create Account →</button>
    
    <div class="divider">
      <span>Already have an account?</span>
    </div>
    
    <a href="login.html" class="btn-secondary">Sign In Instead</a>
    
    <div class="terms">
      By creating an account, you agree to our 
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:3000/api' : 'https://xpressfixing-backend-production.up.railway.app/api';

function showError(message) {
  const errorDiv = document.getElementById('signup-error');
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
  setTimeout(() => {
    errorDiv.style.display = 'none';
  }, 3000);
}

function showSuccess(message) {
  const successDiv = document.getElementById('signup-success');
  successDiv.textContent = message;
  successDiv.style.display = 'block';
  setTimeout(() => {
    successDiv.style.display = 'none';
  }, 3000);
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}

async function handleSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const phone = document.getElementById('signup-phone').value.trim();
  const location = document.getElementById('signup-location').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  
  if (!name || !email || !phone || !location || !password || !confirm) {
    showError('Please fill in all fields');
    return;
  }
  
  if (password !== confirm) {
    showError('Passwords do not match');
    return;
  }
  
  if (password.length < 6) {
    showError('Password must be at least 6 characters');
    return;
  }
  
  try {
    console.log('🔄 Sending signup request...');
    
    const response = await fetch(`${API_URL}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        email,
        phone,
        location,
        password
      })
    });
    
    const data = await response.json();
    console.log('📥 Response:', data);
    
    if (data.success) {
      showSuccess('Account created successfully! Redirecting...');
      
      // Save user to localStorage
      localStorage.setItem('xpressfixing_current_user', JSON.stringify(data.user));
      
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 2000);
    } else {
      showError(data.error || 'Signup failed. Please try again.');
    }
  } catch (error) {
    console.error('❌ Error:', error);
    showError('Cannot connect to server. Make sure backend is running on port 3000');
  }
}
</script>
</body>
</html>
