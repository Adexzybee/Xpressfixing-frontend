<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Apply as Engineer — Xpressfixing</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0d14;
  --surface: #13131e;
  --card: #1a1a28;
  --border: #272738;
  --accent: #ffb84d;
  --accent-2: #ff9f4a;
  --accent-soft: rgba(255,184,77,0.12);
  --text: #f0f0fa;
  --muted: #6b6b8f;
  --danger: #ff6b6b;
  --success: #00d4aa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #0d0d14 0%, #13131e 100%);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  text-decoration: none;
  margin-bottom: 24px;
  transition: color 0.3s ease;
}

.back-link:hover {
  color: var(--accent);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
}

.logo span {
  color: var(--accent);
}

.logo-sub {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
}

.brand-badge {
  background: var(--accent-soft);
  border: 1px solid rgba(255,184,77,0.2);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 0.7rem;
  color: var(--accent);
  display: inline-block;
  margin-bottom: 20px;
}

.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
}

.input-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 500;
}

input, select, textarea {
  width: 100%;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.9rem;
  transition: all 0.3s ease;
  font-family: 'DM Sans', sans-serif;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

textarea {
  resize: vertical;
  min-height: 80px;
}

.speciality-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 8px;
}

.speciality-option {
  padding: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s ease;
}

.speciality-option.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  border-radius: 12px;
  color: #001b12;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 8px;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,184,77,0.3);
}

.btn-secondary {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 12px;
  text-decoration: none;
  display: inline-block;
  text-align: center;
}

.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.error-message {
  background: rgba(255,107,107,0.1);
  border: 1px solid var(--danger);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 20px;
  color: var(--danger);
  font-size: 0.85rem;
  display: none;
}

.success-message {
  background: rgba(0,212,170,0.1);
  border: 1px solid var(--success);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 20px;
  color: var(--success);
  font-size: 0.85rem;
  display: none;
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #001b12;
  padding: 12px 24px;
  border-radius: 12px;
  font-weight: 600;
  z-index: 1000;
  display: none;
}

@media (max-width: 480px) {
  .auth-card {
    padding: 24px;
  }
  .speciality-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="container">
  <a href="../public/index.html" class="back-link">← Back to Home</a>
  
  <div class="logo">
    xpress<span>fixing</span>
    <div class="logo-sub">Join Our Team</div>
  </div>

  <div class="auth-card">
    <div style="text-align: center;">
      <div class="brand-badge">🔧 Engineer Application</div>
    </div>
    
    <div id="apply-error" class="error-message"></div>
    <div id="apply-success" class="success-message"></div>
    
    <div class="input-group">
      <label>Full Name *</label>
      <input type="text" id="eng-name" placeholder="Adebayo Suleiman">
    </div>
    
    <div class="input-group">
      <label>Email Address *</label>
      <input type="email" id="eng-email" placeholder="engineer@example.com">
    </div>
    
    <div class="input-group">
      <label>Phone Number *</label>
      <input type="tel" id="eng-phone" placeholder="0812 345 6789">
    </div>
    
    <div class="input-group">
      <label>Location (City) *</label>
      <input type="text" id="eng-location" placeholder="Lagos, Abuja, Port Harcourt">
    </div>
    
    <div class="input-group">
      <label>Specialities * (select all that apply)</label>
      <div class="speciality-grid" id="speciality-grid">
        <div class="speciality-option" data-speciality="iPhone/iOS">🍎 iPhone/iOS</div>
        <div class="speciality-option" data-speciality="Android">🤖 Android</div>
        <div class="speciality-option" data-speciality="Samsung">📱 Samsung</div>
        <div class="speciality-option" data-speciality="Laptop">💻 Laptop/MacBook</div>
        <div class="speciality-option" data-speciality="Tablet">📟 Tablet/iPad</div>
        <div class="speciality-option" data-speciality="Smartwatch">⌚ Smartwatch</div>
        <div class="speciality-option" data-speciality="General">🔧 General Repairs</div>
      </div>
      <input type="hidden" id="eng-specialities" value="">
    </div>
    
    <div class="input-group">
      <label>Years of Experience *</label>
      <select id="eng-experience">
        <option value="">Select experience level</option>
        <option value="Less than 1 year">Less than 1 year</option>
        <option value="1-2 years">1-2 years</option>
        <option value="3-5 years">3-5 years</option>
        <option value="5-10 years">5-10 years</option>
        <option value="10+ years">10+ years</option>
      </select>
    </div>
    
    <div class="input-group">
      <label>Why do you want to join Xpressfixing? *</label>
      <textarea id="eng-motivation" placeholder="Tell us about your passion for repairs and why you'd be a great fit..."></textarea>
    </div>
    
    <div class="input-group">
      <label>Portfolio / Previous Work (optional)</label>
      <input type="text" id="eng-portfolio" placeholder="Link to portfolio, GitHub, or previous work">
    </div>
    
    <div class="input-group">
      <label>Password *</label>
      <input type="password" id="eng-password" placeholder="Create a strong password">
    </div>
    
    <div class="input-group">
      <label>Confirm Password *</label>
      <input type="password" id="eng-confirm" placeholder="Confirm your password">
    </div>
    
    <button class="btn-primary" onclick="submitApplication()">Submit Application →</button>
    
    <div class="divider" style="margin: 24px 0; text-align: center; position: relative;">
      <hr style="border-color: var(--border);">
      <span style="background: var(--card); padding: 0 12px; color: var(--muted);">Already an engineer?</span>
    </div>
    
    <a href="login.html" class="btn-secondary">Sign In Instead</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API_URL = 'http://localhost:3000/api';
let selectedSpecialities = [];

function toggleSpeciality(element, speciality) {
  element.classList.toggle('selected');
  if (element.classList.contains('selected')) {
    if (!selectedSpecialities.includes(speciality)) {
      selectedSpecialities.push(speciality);
    }
  } else {
    selectedSpecialities = selectedSpecialities.filter(s => s !== speciality);
  }
  document.getElementById('eng-specialities').value = selectedSpecialities.join(', ');
}

document.querySelectorAll('.speciality-option').forEach(btn => {
  const speciality = btn.getAttribute('data-speciality');
  btn.onclick = () => toggleSpeciality(btn, speciality);
});

function showError(message) {
  const errorDiv = document.getElementById('apply-error');
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
  setTimeout(() => {
    errorDiv.style.display = 'none';
  }, 4000);
}

function showSuccess(message) {
  const successDiv = document.getElementById('apply-success');
  successDiv.textContent = message;
  successDiv.style.display = 'block';
  setTimeout(() => {
    successDiv.style.display = 'none';
  }, 4000);
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}

async function submitApplication() {
  const name = document.getElementById('eng-name').value.trim();
  const email = document.getElementById('eng-email').value.trim();
  const phone = document.getElementById('eng-phone').value.trim();
  const location = document.getElementById('eng-location').value.trim();
  const specialities = document.getElementById('eng-specialities').value;
  const experience = document.getElementById('eng-experience').value;
  const motivation = document.getElementById('eng-motivation').value.trim();
  const portfolio = document.getElementById('eng-portfolio').value.trim();
  const password = document.getElementById('eng-password').value;
  const confirm = document.getElementById('eng-confirm').value;
  
  if (!name || !email || !phone || !location || !specialities || !experience || !motivation || !password || !confirm) {
    showError('Please fill in all required fields (*)');
    return;
  }
  
  if (password !== confirm) {
    showError('Passwords do not match');
    return;
  }
  
  if (password.length < 6) {
    showError('Password must be at least 6 characters');
    return;
  }
  
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    showError('Please enter a valid email address');
    return;
  }
  
  try {
    console.log('🔄 Submitting engineer application...');
    
    const response = await fetch(`${API_URL}/auth/apply-engineer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        email,
        phone,
        location,
        specialities,
        experience,
        motivation,
        portfolio,
        password
      })
    });
    
    const data = await response.json();
    console.log('📥 Response:', data);
    
    if (data.success) {
      showSuccess('Application submitted successfully! Our team will review your profile. You will receive an email once approved.');
      
      // Clear form
      document.getElementById('eng-name').value = '';
      document.getElementById('eng-email').value = '';
      document.getElementById('eng-phone').value = '';
      document.getElementById('eng-location').value = '';
      document.getElementById('eng-experience').value = '';
      document.getElementById('eng-motivation').value = '';
      document.getElementById('eng-portfolio').value = '';
      document.getElementById('eng-password').value = '';
      document.getElementById('eng-confirm').value = '';
      selectedSpecialities = [];
      document.querySelectorAll('.speciality-option').forEach(opt => opt.classList.remove('selected'));
      document.getElementById('eng-specialities').value = '';
      
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 4000);
    } else {
      showError(data.error || 'Application failed. Please try again.');
    }
  } catch (error) {
    console.error('❌ Error:', error);
    showError('Cannot connect to server. Make sure backend is running on port 3000');
  }
}
</script>
</body>
</html>
