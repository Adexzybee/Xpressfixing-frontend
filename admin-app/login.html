<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Xpressfixing — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #1a1a25;
  --border: #2a2a3a;
  --accent: #ff6b6b;
  --accent-2: #ffb84d;
  --accent-soft: rgba(255,107,107,0.12);
  --text: #ffffff;
  --muted: #8a8aa3;
  --danger: #ff6b6b;
  --success: #00d4aa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #0a0a0f 0%, #111118 100%);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
}

.logo span {
  color: var(--accent);
}

.logo-sub {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
}

.brand-badge {
  background: var(--accent-soft);
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 0.7rem;
  color: var(--accent);
  display: inline-block;
  margin-bottom: 20px;
}

.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
}

.input-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 500;
}

input {
  width: 100%;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.9rem;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  border-radius: 12px;
  color: #fff;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 8px;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,107,107,0.3);
}

.security-note {
  text-align: center;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 0.7rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.error-message {
  background: rgba(255,107,107,0.1);
  border: 1px solid var(--danger);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 20px;
  color: var(--danger);
  font-size: 0.85rem;
  display: none;
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-weight: 600;
  z-index: 1000;
  display: none;
}

@media (max-width: 480px) {
  .auth-card {
    padding: 24px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    xpress<span>fixing</span>
    <div class="logo-sub">Administrator Access</div>
  </div>

  <div class="auth-card">
    <div style="text-align: center;">
      <div class="brand-badge">👑 Admin Portal</div>
    </div>

    <div id="login-error" class="error-message"></div>
    
    <div class="input-group">
      <label>Admin Email</label>
      <input type="email" id="admin-email" placeholder="admin@xpressfixing.com">
    </div>
    
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="admin-password" placeholder="••••••••">
    </div>
    
    <div class="input-group">
      <label>2FA Code (Demo: 123456)</label>
      <input type="text" id="admin-2fa" placeholder="Enter 6-digit code">
    </div>
    
    <button class="btn-primary" onclick="handleAdminLogin()">Access Admin Panel →</button>
    
    <div class="security-note">
      🔒 This area is restricted to authorized personnel only
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>

let users = JSON.parse(localStorage.getItem('xpressfixing_users')) || [];

const demoAdmin = {
  id: 3,
  name: 'Super Admin',
  email: 'admin@xpressfixing.com',
  password: 'demo123',
  role: 'admin',
  twoFactorCode: '123456',
  createdAt: new Date().toISOString(),
  lastLogin: null
};

if (!users.find(u => u.email === demoAdmin.email)) {
  users.push(demoAdmin);
}
localStorage.setItem('xpressfixing_users', JSON.stringify(users));

function showError(message) {
  const errorDiv = document.getElementById('login-error');
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
  setTimeout(() => {
    errorDiv.style.display = 'none';
  }, 3000);
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}

function handleAdminLogin() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  const twoFactor = document.getElementById('admin-2fa').value;
  
  if (!email || !password || !twoFactor) {
    showError('Please fill in all fields');
    return;
  }
  
  const user = users.find(u => u.email === email && u.password === password);
  
  if (!user) {
    showError('Invalid credentials');
    return;
  }
  
  if (user.role !== 'admin') {
    showError('Access denied. Admin privileges required.');
    return;
  }
  
  if (twoFactor !== '123456') {
    showError('Invalid 2FA code. Demo code: 123456');
    return;
  }
  
  user.lastLogin = new Date().toISOString();
  localStorage.setItem('xpressfixing_users', JSON.stringify(users));
  localStorage.setItem('xpressfixing_current_user', JSON.stringify(user));
  
  showToast('2FA verified. Access granted!');
  
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1000);
}

function autoFillDemo() {
  document.getElementById('admin-email').value = 'admin@xpressfixing.com';
  document.getElementById('admin-password').value = 'demo123';
  document.getElementById('admin-2fa').value = '123456';
}

const demoHint = document.createElement('div');
demoHint.style.cssText = `
  text-align: center;
  margin-top: 16px;
  color: var(--muted);
  font-size: 0.75rem;
  cursor: pointer;
`;
demoHint.innerHTML = '👑 Demo: <span onclick="autoFillDemo()">admin@xpressfixing.com / demo123 / 123456</span>';
document.querySelector('.container').appendChild(demoHint);
</script>
</body>
</html>
